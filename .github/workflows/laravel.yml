name: Laravel CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_DATABASE: sipeip_test
          MYSQL_ROOT_PASSWORD: password

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, xml, curl, zip
          coverage: none

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Preparar Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Instalar dependencias Node
        run: npm ci

      - name: Compilar Assets
        run: npm run build

      - name: Ejecutar migraciones
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: sipeip_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan migrate --force

      - name: Ejecutar pruebas
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: sipeip_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: php artisan test